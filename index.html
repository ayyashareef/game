<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fun Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-1: #eaf4ff;
    --bg-2: #f1ecff;
    --bg-3: #fdeef3;
    --ink: #2c3b66;
    --ink-soft: #6b78a0;
    --card-radius: 30px;

    --green-1: #6fe08a;
    --green-2: #27b15f;
    --green-sh: rgba(39, 177, 95, 0.40);

    --coral-1: #ff9a6b;
    --coral-2: #ff5d7d;
    --coral-sh: rgba(255, 93, 125, 0.40);

    --blue-1: #5ec8f7;
    --blue-2: #2b8fe0;
    --blue-sh: rgba(43, 143, 224, 0.40);

    --font: 'Fredoka', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(120% 90% at 15% 5%, var(--bg-1) 0%, transparent 55%),
      radial-gradient(120% 90% at 90% 0%, var(--bg-3) 0%, transparent 50%),
      linear-gradient(170deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
    min-height: 100%;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- floating decorative shapes ---------- */
  .decor { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .blob {
    position: absolute;
    border-radius: 32% 68% 60% 40% / 45% 45% 55% 55%;
    opacity: 0.5;
    filter: blur(2px);
    animation: floaty 9s ease-in-out infinite;
  }
  .blob.b1 { width: 150px; height: 150px; left: 6%;  top: 18%; background: #bfe3ff; animation-delay: 0s; }
  .blob.b2 { width: 110px; height: 110px; right: 9%; top: 12%; background: #ffd6c4; animation-delay: 1.2s; }
  .blob.b3 { width: 90px;  height: 90px;  left: 12%; bottom: 12%; background: #d8ccff; animation-delay: 2.1s; }
  .blob.b4 { width: 130px; height: 130px; right: 7%; bottom: 8%;  background: #c7f3d4; animation-delay: 0.6s; }
  .blob.b5 { width: 64px;  height: 64px;  left: 46%; top: 8%;   background: #ffe6a3; animation-delay: 1.8s; }

  .sparkle { position: absolute; font-size: 22px; opacity: 0.8; animation: twinkle 4s ease-in-out infinite; }
  .sparkle.s1 { left: 22%; top: 26%; animation-delay: .2s; }
  .sparkle.s2 { right: 20%; top: 30%; animation-delay: 1.1s; }
  .sparkle.s3 { left: 30%; bottom: 16%; animation-delay: 2s; }
  .sparkle.s4 { right: 26%; bottom: 22%; animation-delay: .8s; }

  @keyframes floaty {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%     { transform: translateY(-22px) rotate(8deg); }
  }
  @keyframes twinkle {
    0%,100% { transform: scale(.7) rotate(-8deg); opacity: .35; }
    50%     { transform: scale(1.15) rotate(8deg); opacity: .9; }
  }

  /* ---------- layout ---------- */
  .stage {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 28px;
  }

  /* ---------- top bar ---------- */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 26px;
    pointer-events: none;
  }
  .brand-mini {
    display: flex; align-items: center; gap: 9px;
    font-weight: 600; font-size: 18px; color: var(--ink);
    pointer-events: auto;
  }
  .brand-mini .dot {
    width: 32px; height: 32px; border-radius: 11px;
    display: grid; place-items: center; font-size: 18px;
    background: #fff;
    box-shadow: 0 6px 14px rgba(70,90,150,.16);
  }
  .icon-btn {
    pointer-events: auto;
    width: 46px; height: 46px;
    border: none; border-radius: 16px;
    background: #ffffff;
    color: var(--ink);
    font-size: 20px;
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 8px 18px rgba(70,90,150,.16);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .icon-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 22px rgba(70,90,150,.22); }
  .icon-btn:active { transform: translateY(1px) scale(.95); }

  /* ---------- hero ---------- */
  .hero { text-align: center; margin-bottom: 40px; }
  .hero .logo {
    display: inline-flex; align-items: center; gap: 16px;
    margin-bottom: 14px;
  }
  .hero .badge {
    width: 76px; height: 76px;
    border-radius: 24px;
    display: grid; place-items: center;
    font-size: 40px;
    background: linear-gradient(150deg, #fff, #f1f4ff);
    box-shadow: 0 14px 30px rgba(80,90,170,.22), inset 0 -3px 0 rgba(120,130,200,.12);
    animation: wiggle 5s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%,92%,100% { transform: rotate(0deg); }
    94% { transform: rotate(-9deg); }
    96% { transform: rotate(7deg); }
    98% { transform: rotate(-4deg); }
  }
  .hero h1 {
    font-size: clamp(44px, 7vw, 74px);
    font-weight: 700;
    line-height: .95;
    letter-spacing: -1px;
    background: linear-gradient(120deg, #6a5cff, #ff6b9d 55%, #ff9a4d);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero p {
    margin-top: 12px;
    font-size: clamp(17px, 2.2vw, 21px);
    font-weight: 500;
    color: var(--ink-soft);
  }

  /* ---------- card grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 268px));
    gap: 26px;
    width: 100%;
    max-width: 900px;
  }

  .card {
    position: relative;
    border-radius: var(--card-radius);
    padding: 26px 24px 24px;
    color: #fff;
    text-align: center;
    cursor: pointer;
    border: none;
    font-family: var(--font);
    overflow: hidden;
    isolation: isolate;
    background: linear-gradient(160deg, var(--c1), var(--c2));
    box-shadow: 0 18px 32px -10px var(--csh), inset 0 2px 0 rgba(255,255,255,.35);
    transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease;
    will-change: transform;
  }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(120% 80% at 50% -20%, rgba(255,255,255,.35), transparent 60%);
    z-index: -1;
  }
  .card.green { --c1: var(--green-1); --c2: var(--green-2); --csh: var(--green-sh); }
  .card.coral { --c1: var(--coral-1); --c2: var(--coral-2); --csh: var(--coral-sh); }
  .card.blue  { --c1: var(--blue-1);  --c2: var(--blue-2);  --csh: var(--blue-sh); }

  .card:hover { transform: translateY(-10px) scale(1.025); box-shadow: 0 30px 46px -12px var(--csh), inset 0 2px 0 rgba(255,255,255,.4); }
  .card:active { transform: translateY(-2px) scale(.99); }
  .card:focus-visible { outline: 4px solid rgba(255,255,255,.85); outline-offset: 3px; }

  .card .tile {
    width: 108px; height: 108px;
    margin: 4px auto 18px;
    border-radius: 28px;
    display: grid; place-items: center;
    font-size: 56px;
    background: rgba(255,255,255,.92);
    box-shadow: 0 10px 20px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.05);
  }
  .card .tile span { display: block; animation: bob 3.2s ease-in-out infinite; }
  .card:nth-child(2) .tile span { animation-delay: .4s; }
  .card:nth-child(3) .tile span { animation-delay: .8s; }
  @keyframes bob {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%     { transform: translateY(-7px) rotate(3deg); }
  }

  .card h2 {
    font-size: 27px;
    font-weight: 700;
    line-height: 1.06;
    margin-bottom: 8px;
    text-shadow: 0 2px 0 rgba(0,0,0,.10);
  }
  .card .desc {
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.35;
    opacity: .96;
    min-height: 38px;
    margin-bottom: 18px;
  }
  .play {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 24px 11px 22px;
    border-radius: 999px;
    font-size: 16px; font-weight: 600;
    color: var(--c2);
    background: #fff;
    box-shadow: 0 8px 16px rgba(0,0,0,.16);
    transition: gap .2s ease, transform .2s ease;
  }
  .card:hover .play { gap: 12px; }
  .play .tri {
    width: 0; height: 0;
    border-left: 11px solid currentColor;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
  }

  /* tiny corner accent */
  .card .meta {
    position: absolute; top: 16px; right: 16px;
    font-size: 12.5px; font-weight: 600;
    padding: 5px 11px; border-radius: 999px;
    background: rgba(255,255,255,.22);
    backdrop-filter: blur(2px);
  }

  /* ---------- footer ---------- */
  .foot {
    margin-top: 36px;
    font-size: 15px; font-weight: 500;
    color: var(--ink-soft);
    display: flex; align-items: center; gap: 7px;
  }
  .foot .heart { color: #ff6b9d; animation: beat 1.6s ease-in-out infinite; }
  @keyframes beat { 0%,100%{transform:scale(1)} 15%{transform:scale(1.25)} 30%{transform:scale(1)} }

  /* ---------- entrance (pure CSS, always ends visible) ---------- */
  .reveal { animation: rise .7s cubic-bezier(.22,1,.36,1) both; }
  .hero.reveal { animation-delay: 0s; }
  .grid > .card:nth-child(1) { animation-delay: .12s; }
  .grid > .card:nth-child(2) { animation-delay: .22s; }
  .grid > .card:nth-child(3) { animation-delay: .32s; }
  .foot { animation: rise .7s cubic-bezier(.22,1,.36,1) .42s both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(26px) scale(.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .reveal, .foot, .hero { opacity: 1 !important; transform: none !important; }
  }

  /* ---------- launch overlay ---------- */
  .launch {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 22px;
    opacity: 0; pointer-events: none;
    transition: opacity .35s ease;
    background: linear-gradient(160deg, var(--lc1, #6a5cff), var(--lc2, #ff6b9d));
    color: #fff;
  }
  .launch.show { opacity: 1; pointer-events: auto; }
  .launch .l-tile {
    width: 150px; height: 150px; border-radius: 38px;
    background: rgba(255,255,255,.95);
    display: grid; place-items: center; font-size: 80px;
    box-shadow: 0 24px 50px rgba(0,0,0,.25);
    animation: pop .5s cubic-bezier(.34,1.56,.64,1), bob 2.6s ease-in-out .5s infinite;
  }
  @keyframes pop { from { transform: scale(.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .launch h3 { font-size: 34px; font-weight: 700; }
  .launch .loader {
    width: 190px; height: 12px; border-radius: 999px;
    background: rgba(255,255,255,.3); overflow: hidden;
  }
  .launch .loader i {
    display: block; height: 100%; width: 0;
    border-radius: 999px; background: #fff;
  }
  .launch.show .loader i { animation: fill 1.5s ease forwards; }
  @keyframes fill { to { width: 100%; } }
  .launch .home-back {
    margin-top: 6px;
    border: none; cursor: pointer;
    font-family: var(--font); font-weight: 600; font-size: 15px;
    color: #fff; background: rgba(255,255,255,.2);
    padding: 11px 22px; border-radius: 999px;
    transition: background .2s ease, transform .2s ease;
  }
  .launch .home-back:hover { background: rgba(255,255,255,.32); transform: translateY(-2px); }

  @media (max-width: 760px) {
    .grid { grid-template-columns: minmax(0, 320px); max-width: 320px; }
    .stage { padding-top: 84px; }
  }
</style>
</head>
<body>
  <div class="decor" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="blob b4"></span>
    <span class="blob b5"></span>
    <span class="sparkle s1">✨</span>
    <span class="sparkle s2">⭐</span>
    <span class="sparkle s3">✨</span>
    <span class="sparkle s4">⭐</span>
  </div>

  <header class="topbar">
    <div class="brand-mini"><span class="dot">🎈</span> Playroom</div>
    <button class="icon-btn" id="soundBtn" title="Sound" aria-label="Toggle sound">🔊</button>
  </header>

  <main class="stage" id="stage">
    <section class="hero reveal">
      <div class="logo">
        <span class="badge">🎮</span>
      </div>
      <h1>Fun Games</h1>
      <p>Pick a game to play!</p>
    </section>

    <div class="grid">
      <button class="card green reveal" data-href="bike.html" data-emoji="🚵" data-name="Mountain Bike" data-c1="#6fe08a" data-c2="#27b15f">
        <span class="meta">6 trails</span>
        <div class="tile"><span>🚵</span></div>
        <h2>Mountain Bike</h2>
        <p class="desc">Ride the hills &amp; collect shiny stars</p>
        <span class="play"><span class="tri"></span> Play</span>
      </button>

      <button class="card coral reveal" data-href="thaana.html" data-emoji="✏️" data-name="Thaana Letters" data-c1="#ff9a6b" data-c2="#ff5d7d">
        <span class="meta">24 letters</span>
        <div class="tile"><span>✏️</span></div>
        <h2>Thaana Letters</h2>
        <p class="desc">Trace the Haa Shaviyani letters</p>
        <span class="play"><span class="tri"></span> Play</span>
      </button>

      <button class="card blue reveal" data-href="abc.html" data-emoji="🔤" data-name="ABC Letters" data-c1="#5ec8f7" data-c2="#2b8fe0">
        <span class="meta">A – Z</span>
        <div class="tile"><span>🔤</span></div>
        <h2>ABC Letters</h2>
        <p class="desc">Trace A to Z with fun words</p>
        <span class="play"><span class="tri"></span> Play</span>
      </button>
    </div>

    <div class="foot">Made for ages 4–9 <span class="heart">♥</span></div>
  </main>

  <!-- launch transition -->
  <div class="launch" id="launch">
    <div class="l-tile" id="launchTile">🚵</div>
    <h3 id="launchText">Let's go!</h3>
    <div class="loader"><i></i></div>
    <button class="home-back" id="launchBack">← Back to games</button>
  </div>

  <script>
    // sound toggle (remembered; the games keep their own in-game sound setting)
    const soundBtn = document.getElementById('soundBtn');
    let soundOn = localStorage.getItem('playroom_sound') !== 'off';
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      localStorage.setItem('playroom_sound', soundOn ? 'on' : 'off');
      soundBtn.textContent = soundOn ? '🔊' : '🔇';
      pop(soundBtn);
    });
    function pop(el) {
      el.animate(
        [{ transform: 'scale(1)' }, { transform: 'scale(.85)' }, { transform: 'scale(1)' }],
        { duration: 220, easing: 'ease-out' }
      );
    }

    // themed launch transition, then navigate to the game page
    const launch = document.getElementById('launch');
    const launchTile = document.getElementById('launchTile');
    const launchText = document.getElementById('launchText');
    let launchTimer = null, target = null;

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        target = card.dataset.href;
        launchTile.textContent = card.dataset.emoji;
        launchText.textContent = 'Starting ' + card.dataset.name + '…';
        launch.style.setProperty('--lc1', card.dataset.c1);
        launch.style.setProperty('--lc2', card.dataset.c2);
        launch.classList.add('show');
        clearTimeout(launchTimer);
        launchTimer = setTimeout(() => { if (target) window.location.href = target; }, 1050);
      });
    });

    document.getElementById('launchBack').addEventListener('click', () => {
      clearTimeout(launchTimer);
      target = null;
      launch.classList.remove('show');
    });
  </script>
</body>
</html>
